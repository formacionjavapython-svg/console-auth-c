name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-java@v3
      with:
        java-version: '11'  # Java 11 para compatibilidad con entorno local
        distribution: 'temurin'
    
    - name: Compile Java files
      run: |
        mkdir -p out
        find src -name "*.java" > sources.txt
        javac -d out @sources.txt
    
    - name: Run tests
      run: |
        # Check if TestRunner exists
        if find . -name "*TestRunner*.java" | grep -q .; then
          echo "Compiling TestRunner..."
          find . -name "*TestRunner*.java" > testrunner.txt
          javac -d out @testrunner.txt
          java -cp out TestRunner
        else
          echo "No TestRunner found, skipping tests"
        fi
    
    - name: Download and run Checkstyle
      run: |
        wget -q -O checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.5/checkstyle-10.12.5-all.jar
        java -jar checkstyle.jar -c checkstyle.xml src/

