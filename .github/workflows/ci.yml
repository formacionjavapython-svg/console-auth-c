name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-java@v3
      with:
        java-version: '11'  # Java 11 para compatibilidad con entorno local
        distribution: 'temurin'
    
    - name: Compile Java files
      run: |
        mkdir -p out
        find src -name "*.java" > sources.txt
        javac -d out @sources.txt
    
    - name: Run tests
      run: |
        # Create and compile TestMain
        echo 'public class TestMain { public static void main(String[] args) { new TestCase().testRegisterSuccess(); new TestCase().testLoginSuccess(); }}' > TestMain.java
        javac -d out -cp out TestMain.java
        java -cp out TestMain

    - name: Download and run Checkstyle
      run: |
        wget -q -O checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.5/checkstyle-10.12.5-all.jar
        java -jar checkstyle.jar -c checkstyle.xml src/

