name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compilar con javac
        run: |
          mkdir -p out
          # Usamos find para encontrar TODOS los archivos .java y compilarlos juntos
          find src -name "*.java" > sources.txt
          javac -d out -cp "src/main/java:src/test/java" @sources.txt
          
      - name: Ejecución de Tests
        run: java -cp out TestRunner

      - name: Checkstyle Verification
        run: java -jar checkstyle.jar -c checkstyle.xml src/