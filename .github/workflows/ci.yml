name: CI

on: [ push, pull_request ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Java
        run: |
          mkdir -p out
          find src -name "*.java" > sources.txt
          javac -d out -cp "lib/*:." @sources.txt

      - name: Run Tests
        run: java -cp "out:lib/*" test.java.TestRunner

      - name: Checkstyle
        run: java -jar checkstyle.jar -c checkstyle.xml src/
