name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      AUTH_PEPPER_SECRET: test_pepper

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar proyecto
        run: |
          find src -name "*.java" > sources.txt
          javac -d out @sources.txt

      - name: Ejecutar tests
        run: |
          java -cp out com.auth.app.TestMain

      - name: Descargar Checkstyle
        run: |
          curl -L -o checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar

      - name: Ejecutar Checkstyle
        run: |
          java -jar checkstyle.jar -c checkstyle.xml src/
