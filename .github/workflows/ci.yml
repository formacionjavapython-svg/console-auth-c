name: CI - Build, Test & Analysis

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar
        run: javac src/main/java/*.java

      - name: Ejecutar pruebas
        env:
          AUTH_PEPPER: ci-test-pepper-2025
        run: java -cp src/main/java AuthServiceTest

      - name: Ejecutar aplicacion (smoke test)
        env:
          AUTH_PEPPER: ci-test-pepper-2025
        run: echo "3" | java -cp src/main/java Main
