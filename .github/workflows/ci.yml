name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar
        run: find src/main/java -name "*.java" > sources.txt && javac -d out @sources.txt

      - name: Compilar tests
        run: find src/test/java -name "*.java" > tests.txt && javac -cp out -d out @tests.txt

      - name: Ejecutar tests
        run: java -cp out auth.TestRunner