name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar codigo
        run: |
          mkdir -p out
          find src -name "*.java" > sources.txt
          javac -d out @sources.txt

      - name: Ejecutar pruebas
        run: java -cp out TestRunner

      - name: Descargar Checkstyle
        run: curl -sL -o checkstyle.jar https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.18.2/checkstyle-10.18.2-all.jar

      - name: Ejecutar Checkstyle
        run: java -jar checkstyle.jar -c checkstyle.xml src/
